<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>끝말잇기 배틀 🎤</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root {
  --bg: #f5f5f0;
  --card: #ffffff;
  --border: #e8e8e4;
  --text: #1a1a1a;
  --muted: #888;
  --blue: #378ADD;
  --green: #1D9E75;
  --red: #E24B4A;
  --amber: #EF9F27;
  --info-bg: #EBF4FF;
  --info-text: #185FA5;
  --success-bg: #E1F5EE;
  --success-text: #0F6E56;
  --danger-bg: #FCEBEB;
  --danger-text: #A32D2D;
  --revival-bg: #FAEEDA;
  --revival-text: #633806;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

/* SECTIONS */
.sec { display: none; }
.sec.on { display: block; }

/* TYPOGRAPHY */
h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
h2 { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
.muted { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 1.25rem; }

/* CARDS */
.card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 12px; }

/* BUTTONS */
.btn { display: block; width: 100%; padding: 13px; font-size: 15px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; text-align: center; }
.btn:active { transform: scale(0.97); }
.btn-blue { background: var(--blue); color: #fff; }
.btn-gray { background: #eee; color: #444; }
.btn-outline { background: transparent; color: var(--blue); border: 1.5px solid var(--blue); }
.btn + .btn { margin-top: 8px; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* INPUTS */
input[type=text] { width: 100%; padding: 11px 14px; font-size: 15px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); outline: none; transition: border-color 0.15s; margin-bottom: 10px; }
input[type=text]:focus { border-color: var(--blue); }

/* ROOM CODE */
.room-code-box { background: var(--info-bg); border-radius: 12px; padding: 14px 16px; text-align: center; margin-bottom: 14px; }
.room-code { font-size: 32px; font-weight: 700; letter-spacing: 6px; color: var(--info-text); margin-bottom: 4px; }
.room-code-label { font-size: 12px; color: var(--info-text); opacity: 0.8; }

/* PLAYER LIST */
.peer-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.peer-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border-radius: 10px; padding: 10px 12px; }
.peer-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.peer-dot.me { background: var(--blue); }
.peer-name { font-size: 14px; font-weight: 500; }
.peer-you { font-size: 11px; color: var(--muted); margin-left: 4px; }

/* GAME LAYOUT */
.players-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 12px; }
.player-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 6px; text-align: center; transition: all 0.2s; }
.player-card.active { border-color: var(--blue); border-width: 2px; box-shadow: 0 2px 12px rgba(55,138,221,0.2); }
.player-card.dead { opacity: 0.3; }
.player-card .pname { font-size: 12px; font-weight: 600; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.player-card .hearts { font-size: 13px; }

/* WORD DISPLAY */
.word-box { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 16px; margin-bottom: 10px; text-align: center; }
.big-word { font-size: 38px; font-weight: 700; letter-spacing: 3px; margin-bottom: 4px; }
.next-hint { font-size: 13px; color: var(--muted); }

/* TIMER */
.timer-wrap { height: 7px; background: #eee; border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
.timer-bar { height: 100%; border-radius: 4px; transition: width 0.1s linear, background 0.3s; background: var(--blue); }

/* TURN */
.turn-box { text-align: center; margin-bottom: 12px; }
.turn-name { font-size: 17px; font-weight: 700; }
.turn-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* REVIVAL */
.revival-box { background: var(--revival-bg); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; border: 1px solid #FAC775; text-align: center; }
.revival-title { font-size: 15px; font-weight: 700; color: var(--revival-text); margin-bottom: 3px; }
.revival-desc { font-size: 13px; color: #854F0B; }

/* MIC */
.mic-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 12px; gap: 8px; }
.mic-btn { width: 68px; height: 68px; border-radius: 50%; border: 2px solid var(--border); background: var(--card); font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.mic-btn.active { background: var(--info-bg); border-color: var(--blue); animation: pulse 1s infinite; }
.mic-btn.my-turn-glow { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(55,138,221,0.12); }
.mic-label { font-size: 12px; color: var(--muted); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(55,138,221,0.3);}50%{box-shadow:0 0 0 10px rgba(55,138,221,0);} }

/* AI BUBBLE */
.ai-bubble { background: var(--info-bg); color: var(--info-text); border-radius: 10px; padding: 10px 14px; font-size: 14px; margin-bottom: 10px; line-height: 1.5; min-height: 42px; }

/* WORD CHIPS */
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.chip { font-size: 11px; background: #f0f0ec; border-radius: 20px; padding: 3px 9px; color: var(--muted); }

/* LOG */
.log { background: #fafaf8; border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; max-height: 100px; overflow-y: auto; font-size: 12px; }
.log-line { padding: 2px 0; border-bottom: 1px solid #f0f0ec; color: #555; }
.log-line:last-child { border-bottom: none; }
.log-line.ok { color: var(--green); }
.log-line.err { color: var(--red); }
.log-line.sys { color: var(--blue); font-weight: 600; }

/* KEYBOARD INPUT */
.kb-row { display: flex; gap: 8px; margin-bottom: 10px; }
.kb-row input { flex: 1; margin-bottom: 0; }
.kb-row button { padding: 0 16px; background: var(--blue); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; flex-shrink: 0; }

/* STATUS BAR */
.status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.status-bar .round { font-size: 12px; background: #f0f0ec; border-radius: 20px; padding: 4px 10px; color: var(--muted); }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; }

/* RESULT */
.result-row { display: flex; align-items: center; gap: 10px; background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 10px 14px; margin-bottom: 8px; }
.result-medal { font-size: 20px; width: 28px; }
.result-name { font-size: 14px; font-weight: 600; flex: 1; }
.result-hp { font-size: 14px; }

/* NOTICE */
.notice { font-size: 12px; color: #bbb; text-align: center; margin-top: 14px; line-height: 1.7; }
.tag { display: inline-block; font-size: 11px; background: var(--info-bg); color: var(--info-text); border-radius: 6px; padding: 2px 7px; margin-left: 4px; }

/* SHARE BTN */
.share-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 11px; font-size: 14px; font-weight: 600; border: 1.5px solid var(--blue); border-radius: 12px; background: transparent; color: var(--blue); cursor: pointer; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="app">

  <!-- ① 이름 입력 -->
  <div id="s-name" class="sec on">
    <h1>🎤 끝말잇기 배틀</h1>
    <p class="muted">원격으로 친구들과 음성으로 즐기는 끝말잇기 게임.<br>각자 핸드폰에서 이 링크를 열고 접속하세요.</p>
    <div class="card">
      <h2>내 이름 입력</h2>
      <input type="text" id="my-name" placeholder="닉네임" maxlength="10">
      <button class="btn btn-blue" onclick="goLobby()">계속</button>
    </div>
    <p class="notice">Chrome 브라우저 권장 (마이크 권한 필요)</p>
  </div>

  <!-- ② 로비 -->
  <div id="s-lobby" class="sec">
    <h1>🎮 로비</h1>
    <div id="room-code-box" class="room-code-box" style="display:none;">
      <div class="room-code" id="room-code-display">----</div>
      <div class="room-code-label">이 코드를 친구에게 공유하세요</div>
    </div>
    <button class="share-btn" id="share-btn" onclick="shareRoom()" style="display:none;">
      🔗 방 코드 공유하기
    </button>

    <div class="card" id="join-card">
      <h2>방 코드로 참가</h2>
      <input type="text" id="join-code" placeholder="4자리 코드 입력" maxlength="4" style="text-transform:uppercase;letter-spacing:3px;font-size:18px;text-align:center;">
      <button class="btn btn-outline" onclick="joinRoom()">참가</button>
    </div>

    <div class="card">
      <h2>참가자 <span id="peer-count" style="font-size:13px;color:var(--muted);font-weight:400;">(나 포함)</span></h2>
      <div class="peer-list" id="peer-list"></div>
      <button class="btn btn-blue" id="btn-start-game" onclick="broadcastStartGame()" disabled>게임 시작 (방장만)</button>
    </div>
    <p class="notice">2~4명이 모이면 방장이 게임을 시작하세요.<br>PeerJS P2P 연결 — 서버 없이 직접 연결됩니다.</p>
  </div>

  <!-- ③ 게임 -->
  <div id="s-game" class="sec">
    <div class="status-bar">
      <span style="font-size:14px;font-weight:700;">끝말잇기 배틀</span>
      <span class="round" id="round-badge">라운드 1</span>
    </div>
    <div class="players-grid" id="players-grid"></div>
    <div class="word-box">
      <div class="big-word" id="big-word">-</div>
      <div class="next-hint" id="next-hint">준비 중...</div>
    </div>
    <div class="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>
    <div class="turn-box">
      <div class="turn-name" id="turn-name">-</div>
      <div class="turn-sub" id="turn-sub">대기 중</div>
    </div>
    <div id="revival-box" class="revival-box" style="display:none;">
      <div class="revival-title">🌟 부활 찬스!</div>
      <div class="revival-desc" id="revival-desc"></div>
    </div>
    <div class="mic-wrap">
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
      <div class="mic-label" id="mic-label">마이크 버튼을 눌러 말하세요</div>
    </div>
    <div class="kb-row">
      <input type="text" id="kb-input" placeholder="키보드 입력 (대안)" onkeydown="if(event.key==='Enter')submitKB()">
      <button onclick="submitKB()">입력</button>
    </div>
    <div class="ai-bubble" id="ai-bubble">AI 심판 대기 중...</div>
    <div class="chips" id="chips"></div>
    <div class="log" id="log"></div>
  </div>

  <!-- ④ 결과 -->
  <div id="s-result" class="sec">
    <h1>🏆 게임 종료!</h1>
    <p class="muted" id="result-sub"></p>
    <div id="result-list" style="margin-bottom:16px;"></div>
    <button class="btn btn-blue" onclick="backToLobby()">로비로 돌아가기</button>
  </div>

</div>

<script>
// ─────────────── CONFIG ───────────────
const CLAUDE_API = "https://api.anthropic.com/v1/messages";
const STARTERS = ["사과","나무","구름","바다","하늘","기차","음악","도서관","사랑","영화","여름","겨울"];

// ─────────────── STATE ───────────────
let myName = "";
let myPeerId = "";
let roomCode = "";
let isHost = false;
let peer = null;
let connections = {}; // peerId → DataConnection
let audioConnections = {}; // peerId → MediaConnection
let myStream = null;

let players = []; // [{id, name, hp, alive}]
let currentTurnIdx = 0;
let usedWords = [];
let lastWord = "";
let round = 0;
let timerInterval = null;
let gameActive = false;
let revivalMode = false;
let revivalTarget = "";
let recognition = null;
let isListening = false;

// ─────────────── HELPERS ───────────────
function hp(n){ return "❤️".repeat(Math.max(0,n)) + "🤍".repeat(Math.max(0,3-n)); }
function getLimit(){ return round < 3 ? 10 : round < 7 ? 7 : 5; }
function myPlayer(){ return players.find(p=>p.id===myPeerId); }
function currentPlayer(){ return players[currentTurnIdx]; }
function isMyTurn(){ return currentPlayer()?.id === myPeerId; }
function showSec(id){ document.querySelectorAll(".sec").forEach(s=>s.classList.remove("on")); document.getElementById(id).classList.add("on"); }
function rnd4(){ return Math.random().toString(36).substring(2,6).toUpperCase(); }

function say(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang="ko-KR"; u.rate=1.1;
  window.speechSynthesis.speak(u);
}

function addLog(msg, cls=""){
  const b=document.getElementById("log");
  const e=document.createElement("div"); e.className="log-line "+cls; e.textContent=msg;
  b.appendChild(e); b.scrollTop=b.scrollHeight;
}

function setAI(t){ document.getElementById("ai-bubble").textContent="🤖 AI 심판: "+t; }

// ─────────────── PEER SETUP ───────────────
function initPeer(customId){
  return new Promise((resolve)=>{
    const p = customId
      ? new Peer("wg-"+customId, {debug:0})
      : new Peer({debug:0});
    p.on("open", id=>{ myPeerId=id; resolve(p); });
    p.on("error", e=>{ console.warn("Peer error",e); });
    peer = p;
  });
}

function setupPeerListeners(){
  // 인바운드 데이터 연결
  peer.on("connection", conn=>{
    setupDataConn(conn);
  });
  // 인바운드 오디오 연결
  peer.on("call", call=>{
    call.answer(myStream);
    call.on("stream", remote=>{ playAudio(remote, call.peer); });
    audioConnections[call.peer] = call;
  });
}

function setupDataConn(conn){
  connections[conn.peer] = conn;
  conn.on("data", data=>onData(data, conn.peer));
  conn.on("close", ()=>{ delete connections[conn.peer]; updateLobbyUI(); });
  conn.on("open", ()=>{ updateLobbyUI(); });
}

function callPeer(peerId){
  if(!myStream) return;
  const call = peer.call(peerId, myStream);
  call.on("stream", remote=>{ playAudio(remote, peerId); });
  audioConnections[peerId] = call;
}

function playAudio(stream, peerId){
  let el = document.getElementById("audio-"+peerId);
  if(!el){ el=document.createElement("audio"); el.id="audio-"+peerId; el.autoplay=true; el.style.display="none"; document.body.appendChild(el); }
  el.srcObject = stream;
}

function broadcast(msg){
  Object.values(connections).forEach(c=>{ try{ c.send(msg); }catch(e){} });
}

function send(peerId, msg){
  try{ connections[peerId]?.send(msg); }catch(e){}
}

// ─────────────── LOBBY ───────────────
async function goLobby(){
  myName = document.getElementById("my-name").value.trim() || "익명";
  showSec("s-lobby");

  // 마이크 권한 미리 획득
  try{
    myStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
  } catch(e){
    alert("마이크 권한이 필요합니다! 브라우저 설정에서 허용해주세요.");
  }

  roomCode = rnd4();
  await initPeer(roomCode);
  setupPeerListeners();
  isHost = true;
  myPeerId = peer.id;

  document.getElementById("room-code-display").textContent = roomCode;
  document.getElementById("room-code-box").style.display="block";
  document.getElementById("share-btn").style.display="flex";
  document.getElementById("btn-start-game").disabled = false;
  updateLobbyUI();
}

async function joinRoom(){
  const code = document.getElementById("join-code").value.trim().toUpperCase();
  if(code.length !== 4){ alert("4자리 코드를 입력하세요"); return; }

  try{
    myStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
  } catch(e){
    alert("마이크 권한이 필요합니다!");
  }

  await initPeer(null);
  setupPeerListeners();
  isHost = false;

  const hostId = "wg-"+code;
  const conn = peer.connect(hostId);
  setupDataConn(conn);
  conn.on("open",()=>{
    conn.send({type:"JOIN", name:myName, id:myPeerId});
    callPeer(hostId);
    document.getElementById("join-card").style.display="none";
    document.getElementById("btn-start-game").disabled=true;
    updateLobbyUI();
  });
}

function updateLobbyUI(){
  const list = document.getElementById("peer-list");
  list.innerHTML="";
  // 나 자신
  const me = document.createElement("div"); me.className="peer-item";
  me.innerHTML=`<span class="peer-dot me"></span><span class="peer-name">${myName}</span><span class="peer-you">(나)</span>`;
  list.appendChild(me);
  // 연결된 피어
  Object.values(connections).forEach(c=>{
    if(c._peerName){
      const d=document.createElement("div"); d.className="peer-item";
      d.innerHTML=`<span class="peer-dot"></span><span class="peer-name">${c._peerName}</span>`;
      list.appendChild(d);
    }
  });
  document.getElementById("peer-count").textContent=`(${1+Object.keys(connections).length}명)`;
}

function shareRoom(){
  const url = window.location.href.split("?")[0]+"?room="+roomCode;
  if(navigator.share){
    navigator.share({title:"끝말잇기 배틀", text:`방 코드: ${roomCode}`, url});
  } else {
    navigator.clipboard?.writeText(url);
    alert("링크가 복사됐습니다!\n방 코드: "+roomCode);
  }
}

// ─────────────── DATA MESSAGES ───────────────
function onData(data, fromPeer){
  switch(data.type){
    case "JOIN":
      connections[fromPeer]._peerName = data.name;
      updateLobbyUI();
      // 새 참가자에게 오디오 연결
      callPeer(fromPeer);
      // 기존 참가자들에게 새 참가자 알림
      broadcast({type:"NEW_PEER", name:data.name, id:data.id});
      // 새 참가자에게 현재 참가자 목록 전달
      send(fromPeer, {type:"PEER_LIST", list: getPeerList()});
      break;
    case "NEW_PEER":
      // 새 피어와 오디오 연결 (P2P mesh)
      if(!audioConnections[data.id]) callPeer(data.id);
      break;
    case "PEER_LIST":
      data.list.forEach(p=>{ if(!connections[p.id] && p.id!==myPeerId){ /* mesh */ } });
      break;
    case "START_GAME":
      receiveStartGame(data);
      break;
    case "WORD":
      receiveWord(data);
      break;
    case "TURN_RESULT":
      receiveTurnResult(data);
      break;
    case "NEXT_TURN":
      receiveNextTurn(data);
      break;
    case "GAME_OVER":
      receiveGameOver(data);
      break;
  }
}

function getPeerList(){
  return Object.entries(connections).map(([id,c])=>({id, name:c._peerName||"?"}));
}

// ─────────────── GAME START ───────────────
function broadcastStartGame(){
  if(!isHost) return;
  // 플레이어 목록 구성
  const plist = [{id:myPeerId, name:myName, hp:3, alive:true}];
  Object.entries(connections).forEach(([id,c])=>{
    if(c._peerName) plist.push({id, name:c._peerName, hp:3, alive:true});
  });
  if(plist.length < 2){ alert("최소 2명이 필요합니다!"); return; }

  const firstWord = STARTERS[Math.floor(Math.random()*STARTERS.length)];
  const msg = {type:"START_GAME", players:plist, firstWord, currentTurnIdx:0};
  broadcast(msg);
  initGame(msg);
}

function receiveStartGame(data){ initGame(data); }

function initGame(data){
  players = data.players.map(p=>({...p}));
  lastWord = data.firstWord;
  usedWords = [lastWord];
  currentTurnIdx = data.currentTurnIdx;
  round = 0;
  gameActive = true;
  revivalMode = false;

  showSec("s-game");
  renderPlayers();
  document.getElementById("big-word").textContent = lastWord;
  setNextHint();
  setAI(`게임 시작! 첫 단어: "${lastWord}" — ${currentPlayer().name}님부터!`);
  say(`게임 시작! 첫 단어는 ${lastWord}. ${currentPlayer().name}님 차례입니다.`);
  startTurn();
}

// ─────────────── TURN LOGIC ───────────────
function startTurn(){
  if(!gameActive) return;
  round++;
  const p = currentPlayer();
  const lim = getLimit();

  document.getElementById("round-badge").textContent=`라운드 ${round}`;
  document.getElementById("turn-name").textContent=`${p.name}님 차례`;
  document.getElementById("revival-box").style.display="none";

  if(isMyTurn()){
    document.getElementById("turn-sub").textContent=`제한시간 ${lim}초 — 마이크를 눌러 말하세요`;
    document.getElementById("mic-btn").classList.add("my-turn-glow");
  } else {
    document.getElementById("turn-sub").textContent=`${p.name}님이 말하는 중...`;
    document.getElementById("mic-btn").classList.remove("my-turn-glow");
  }

  renderPlayers();
  runTimer(lim);
}

function runTimer(lim){
  clearInterval(timerInterval);
  let elapsed=0;
  const bar=document.getElementById("timer-bar");
  bar.style.width="100%"; bar.style.background="#378ADD";
  timerInterval=setInterval(()=>{
    elapsed+=0.1;
    const pct=Math.max(0,100-(elapsed/lim*100));
    bar.style.width=pct+"%";
    if(pct<25) bar.style.background="#E24B4A";
    else if(pct<55) bar.style.background="#EF9F27";
    else bar.style.background="#378ADD";
    if(elapsed>=lim){
      clearInterval(timerInterval);
      if(isListening) stopListening();
      if(isMyTurn()) onTimeout();
    }
  },100);
}

function onTimeout(){
  addLog(`⏰ 시간 초과!`,"err");
  const result = {type:"TURN_RESULT", verdict:"TIMEOUT", word:"", player:myPeerId};
  broadcast(result);
  applyTurnResult(result);
}

// ─────────────── MIC / STT ───────────────
function toggleMic(){
  if(!gameActive||!isMyTurn()) return;
  if(isListening){ stopListening(); return; }
  startListening();
}

function startListening(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ addLog("음성인식 미지원 — 키보드 사용","sys"); return; }
  recognition=new SR();
  recognition.lang="ko-KR"; recognition.continuous=false; recognition.interimResults=false;
  recognition.onstart=()=>{ isListening=true; document.getElementById("mic-btn").classList.add("active"); document.getElementById("mic-label").textContent="듣고 있어요... 🔴"; };
  recognition.onresult=(e)=>{ const w=e.results[0][0].transcript.trim(); stopListening(); clearInterval(timerInterval); addLog(`🎤 인식: "${w}"`); processMyWord(w); };
  recognition.onerror=(e)=>{ stopListening(); addLog("인식 오류: "+e.error,"err"); };
  recognition.onend=()=>{ isListening=false; document.getElementById("mic-btn").classList.remove("active"); document.getElementById("mic-label").textContent="마이크 버튼을 눌러 말하세요"; };
  try{ recognition.start(); } catch(e){ addLog("마이크 오류","err"); }
}

function stopListening(){
  if(recognition){try{recognition.stop();}catch(e){}}
  isListening=false;
  document.getElementById("mic-btn").classList.remove("active");
  document.getElementById("mic-label").textContent="마이크 버튼을 눌러 말하세요";
}

function submitKB(){
  const inp=document.getElementById("kb-input");
  const w=inp.value.trim(); if(!w||!gameActive||!isMyTurn()) return;
  inp.value="";
  clearInterval(timerInterval);
  if(isListening) stopListening();
  addLog(`⌨️ 입력: "${w}"`);
  processMyWord(w);
}

// ─────────────── WORD PROCESSING ───────────────
async function processMyWord(spoken){
  if(!isMyTurn()) return;
  setAI(`"${spoken}" 판정 중...`);

  if(revivalMode){
    const valid = spoken[0]===revivalTarget && await askClaude(`"${spoken}"이 동물 이름인가요? JSON만: {"valid":true} 또는 {"valid":false}`);
    const result = {type:"TURN_RESULT", verdict: valid?"REVIVAL_OK":"REVIVAL_FAIL", word:spoken, player:myPeerId};
    broadcast(result);
    applyTurnResult(result);
    return;
  }

  const lastCh = lastWord[lastWord.length-1];
  let verdict = "OK";
  if(spoken[0]!==lastCh) verdict="WRONG_CHAR";
  else if(usedWords.includes(spoken)) verdict="DUPLICATE";
  else {
    const valid = await askClaude(`끝말잇기 판정. 단어: "${spoken}". 실제 존재하는 한국어 단어인가? JSON만: {"valid":true} 또는 {"valid":false}`);
    if(!valid) verdict="INVALID";
  }

  const result = {type:"TURN_RESULT", verdict, word:spoken, player:myPeerId, isLong: spoken.length>=5};
  broadcast(result);
  applyTurnResult(result);
}

function receiveTurnResult(data){ applyTurnResult(data); }

function applyTurnResult(data){
  clearInterval(timerInterval);
  const pidx = players.findIndex(p=>p.id===data.player);
  const pname = pidx>=0 ? players[pidx].name : "?";

  switch(data.verdict){
    case "OK":
      usedWords.push(data.word); lastWord=data.word;
      document.getElementById("big-word").textContent=data.word;
      setNextHint();
      renderChips();
      addLog(`✅ "${data.word}" — 정답!${data.isLong?" (장단어 보너스!)":""}`, "ok");
      setAI(data.isLong?`정답! "${data.word}" — 장단어 보너스!`:`정답! "${data.word}"`);
      say(data.isLong?`정답! ${data.word}, 장단어 보너스!`:`정답! ${data.word}`);
      if(data.isLong) round++;
      advanceTurn();
      break;
    case "TIMEOUT":
      addLog(`⏰ ${pname}님 시간 초과!`,"err");
      setAI(`시간 초과! ${pname}님 HP -1`);
      say(`시간 초과! ${pname}님 하트 줄어듭니다.`);
      loseHP(pidx,"시간 초과");
      break;
    case "WRONG_CHAR":
      addLog(`❌ "${data.word}" — 앞 글자 오류`,"err");
      setAI(`"${data.word}"은 앞 글자가 틀렸습니다! HP -1`);
      say(`앞 글자가 틀렸습니다.`);
      loseHP(pidx,`앞 글자 오류 (${data.word})`);
      break;
    case "DUPLICATE":
      addLog(`❌ "${data.word}" — 중복`,"err");
      setAI(`"${data.word}"은 이미 사용됐습니다! HP -1`);
      say(`이미 나온 단어입니다.`);
      loseHP(pidx,`중복 (${data.word})`);
      break;
    case "INVALID":
      addLog(`❌ "${data.word}" — 없는 단어`,"err");
      setAI(`"${data.word}"은 인정되지 않습니다! HP -1`);
      say(`인정되지 않는 단어입니다.`);
      loseHP(pidx,`없는 단어 (${data.word})`);
      break;
    case "REVIVAL_OK":
      if(pidx>=0) players[pidx].hp=Math.min(3,players[pidx].hp+1);
      addLog(`💚 부활 성공! ${pname} HP+1`,"ok");
      setAI(`💚 부활 성공! ${pname}님 HP 회복!`);
      say(`부활 성공! ${pname}님 하트 회복!`);
      renderPlayers(); revivalMode=false;
      document.getElementById("revival-box").style.display="none";
      advanceTurn();
      break;
    case "REVIVAL_FAIL":
      addLog(`❌ 부활 실패`,"err");
      setAI(`부활 실패! ${pname}님`);
      say(`부활 실패!`);
      revivalMode=false;
      document.getElementById("revival-box").style.display="none";
      advanceTurn();
      break;
  }
}

function loseHP(pidx, reason){
  if(pidx<0) return;
  players[pidx].hp--;
  addLog(`💔 ${players[pidx].name} | ${reason} | HP: ${players[pidx].hp}`,"err");
  if(players[pidx].hp<=0){
    players[pidx].alive=false;
    addLog(`💀 ${players[pidx].name}님 탈락!`,"sys");
    setAI(`${players[pidx].name}님 탈락!`);
    say(`${players[pidx].name}님 탈락!`);
    renderPlayers();
    const alive=players.filter(p=>p.alive);
    if(alive.length<=1){
      gameActive=false;
      if(isHost){
        const msg={type:"GAME_OVER", players};
        broadcast(msg);
        showResult(alive);
      }
      return;
    }
    advanceTurn();
  } else {
    // 부활 찬스 (HP=1, 40% 확률, 호스트만 판단 후 전파)
    if(players[pidx].hp===1 && Math.random()<0.4 && isHost){
      const animals=["강아지","고양이","호랑이","코끼리","기린","독수리","토끼","곰","여우","늑대","사자","펭귄"];
      const hint=animals[Math.floor(Math.random()*animals.length)];
      revivalTarget=hint[hint.length-1];
      revivalMode=true;
      const revMsg={type:"NEXT_TURN", revival:true, revivalHint:hint, revivalTarget, currentTurnIdx, lastWord, usedWords};
      broadcast(revMsg);
      applyNextTurn(revMsg);
      return;
    }
    renderPlayers();
    advanceTurn();
  }
}

function advanceTurn(){
  let next=(currentTurnIdx+1)%players.length, t=0;
  while(!players[next].alive && t++<players.length) next=(next+1)%players.length;
  currentTurnIdx=next;
  renderPlayers();
  if(isHost){
    const msg={type:"NEXT_TURN", revival:false, currentTurnIdx, lastWord, usedWords};
    broadcast(msg);
  }
  startTurn();
}

function receiveNextTurn(data){ applyNextTurn(data); }

function applyNextTurn(data){
  currentTurnIdx=data.currentTurnIdx;
  lastWord=data.lastWord;
  usedWords=data.usedWords;
  document.getElementById("big-word").textContent=lastWord;
  setNextHint(); renderChips();
  if(data.revival){
    revivalMode=true;
    revivalTarget=data.revivalTarget;
    document.getElementById("revival-box").style.display="block";
    document.getElementById("revival-desc").textContent=`"${data.revivalTarget}"로 시작하는 동물 이름을 말하면 ❤️ 회복!`;
    setAI(`🌟 부활 찬스! "${data.revivalTarget}"로 시작하는 동물 이름!`);
    say(`부활 찬스! ${data.revivalTarget}로 시작하는 동물 이름을 말하세요!`);
  }
  renderPlayers();
  startTurn();
}

function receiveGameOver(data){
  gameActive=false;
  players=data.players;
  const alive=players.filter(p=>p.alive);
  showResult(alive);
}

// ─────────────── RENDER ───────────────
function renderPlayers(){
  const g=document.getElementById("players-grid"); g.innerHTML="";
  players.forEach((p,i)=>{
    const c=document.createElement("div");
    c.className="player-card"+(i===currentTurnIdx&&p.alive&&gameActive?" active":"")+(p.alive?"":" dead");
    c.innerHTML=`<div class="pname">${p.name}${p.id===myPeerId?'<span style="font-size:10px;color:#888"> 나</span>':''}</div><div class="hearts">${hp(p.hp)}</div>`;
    g.appendChild(c);
  });
}

function setNextHint(){
  const ch=lastWord[lastWord.length-1];
  document.getElementById("next-hint").textContent=`"${ch}"으로 시작하는 단어를 말하세요`;
}

function renderChips(){
  const c=document.getElementById("chips"); c.innerHTML="";
  usedWords.slice(-12).forEach(w=>{ const s=document.createElement("span"); s.className="chip"; s.textContent=w; c.appendChild(s); });
}

// ─────────────── CLAUDE API ───────────────
async function askClaude(prompt){
  try{
    const r=await fetch(CLAUDE_API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:80,messages:[{role:"user",content:prompt}]})
    });
    const d=await r.json();
    const t=(d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim();
    return JSON.parse(t).valid===true;
  }catch(e){ return true; }
}

// ─────────────── RESULT ───────────────
function showResult(alive){
  const w=alive[0];
  document.getElementById("result-sub").textContent = w?`🎉 ${w.name}님이 최후의 승자입니다!`:"무승부!";
  const list=document.getElementById("result-list"); list.innerHTML="";
  [...players].sort((a,b)=>b.hp-a.hp).forEach((p,i)=>{
    const r=document.createElement("div"); r.className="result-row";
    r.innerHTML=`<span class="result-medal">${["🥇","🥈","🥉","4위"][i]||""}</span><span class="result-name">${p.name}</span><span class="result-hp">${hp(p.hp)}</span>`;
    list.appendChild(r);
  });
  say(w?`게임 종료! ${w.name}님 우승!`:"게임 종료!");
  showSec("s-result");
}

function backToLobby(){ showSec("s-lobby"); updateLobbyUI(); }

// ─────────────── URL PARAM (딥링크) ───────────────
window.addEventListener("load",()=>{
  const params=new URLSearchParams(window.location.search);
  const r=params.get("room");
  if(r){ document.getElementById("join-code").value=r; }
});
</script>
